<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="HireFlow AI — AI-powered recruitment analytics. Upload resumes, score candidates, and find the right talent faster with Big Data." />
    <title>HireFlow AI — Smarter Hiring, Faster</title>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <!-- FOUC prevention: apply saved theme before React renders -->
    <script>
      (function() {
        var saved = localStorage.getItem('hf-theme');
        if (saved) document.documentElement.setAttribute('data-theme', saved);
        else document.documentElement.setAttribute('data-theme', 'dark');
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
